cpus_per_task: 16
eval_name: video_classification_frozen
folder: preliminary_experiments/evals/vitl/vjepa_ek100_ar
mem_per_gpu: 12G
nodes: 1
max_workers: 4
resume_checkpoint: true
tag: vjepa_ek100_ar
tasks_per_node: 1
experiment:
  classifier:
    num_heads: 16
    num_probe_blocks: 4
  data:
    dataset_type: VideoDataset
    dataset_train: data/EK100_action_recognition_train.csv
    dataset_val: data/EK100_action_recognition_validation.csv
    frame_step: 1 # Videos have 4 fps
    frames_per_clip: 16
    num_classes:
    - 97
    - 305
    num_segments: 1
    num_views_per_segment: 1
    resolution: 256
    allow_variable_length: true
  optimization:
    batch_size: 4
    multihead_kwargs:
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.001
      start_lr: 0.001
      warmup: 0.0
      weight_decay: 0.4
